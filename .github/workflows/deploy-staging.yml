name: deploy_staging

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build and deploy'
        required: true
        type: string

env:
  IMAGE_NAME: sirhaana-services

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    environment: Deployment
    outputs:
      image_full: ${{ steps.meta.outputs.image_full }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Generate image metadata
        id: meta
        run: |
          # Strip protocol prefix if present (e.g. https://registry.com -> registry.com)
          REGISTRY=$(echo "${{ secrets.DOCKER_REGISTRY }}" | sed 's|https\?://||')
          IMAGE_FULL="${REGISTRY}/${{ env.IMAGE_NAME }}:staging"
          echo "registry=${REGISTRY}" >> $GITHUB_OUTPUT
          echo "image_full=${IMAGE_FULL}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.meta.outputs.registry }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image_full }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Post build summary
        run: |
          echo "### 🐳 Docker Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ steps.meta.outputs.image_full }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ inputs.branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy to Dokploy
    runs-on: ubuntu-latest
    needs: build
    environment: Deployment
    steps:
      - name: Dokploy Deployment
        uses: benbristow/dokploy-deploy-action@0.2.2
        with:
          api_token: ${{ secrets.DOKPLOY_TOKEN }}
          application_id: ${{ secrets.DOKPLOY_APP_ID }}
          dokploy_url: ${{ secrets.DOKPLOY_URL }}
          service_type: application

      - name: Post deployment summary
        run: |
          echo "### 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ needs.build.outputs.image_full }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ inputs.branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed by** | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | \`$(date -u +"%Y-%m-%dT%H:%M:%SZ")\` |" >> $GITHUB_STEP_SUMMARY
